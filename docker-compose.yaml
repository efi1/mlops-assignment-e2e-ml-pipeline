services:
  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${S3_API_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow-data:/mlflow

  airflow:
    build: .
    image: ${TASK_IMAGE:-agent-eval:latest}
    command: >
      bash -lc "mkdir -p /root/airflow &&
      echo '{\"${AIRFLOW_ADMIN_USER:-admin}\": \"${AIRFLOW_ADMIN_PASSWORD:-admin}\"}' > /root/airflow/simple_auth_manager_passwords.json.generated &&
      uv tool run --with mlflow --with apache-airflow-providers-docker --with docker apache-airflow standalone"
    environment:
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-/home/efov/mlops-assignment-e2e-ml-pipeline}
      AIRFLOW_HOME: /root/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /mlops-assignment/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API_SERVER__HOST: 0.0.0.0
      NEBIUS_API_KEY: ${NEBIUS_API_KEY}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-agent-eval-runs}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      TASK_IMAGE: ${TASK_IMAGE:-agent-eval:latest}
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/mlops-assignment/dags
      - ./runs:/mlops-assignment/runs
    depends_on:
      - minio
      - mlflow

volumes:
  minio-data:
  mlflow-data:
